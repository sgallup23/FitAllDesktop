<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Dark background with rounded corners for app icon shape -->
  <rect width="1024" height="1024" rx="180" ry="180" fill="#0D1117"/>

  <!-- Green circle -->
  <circle cx="512" cy="512" r="340" fill="#22C55E"/>

  <!-- White bold "F" letter centered in the circle -->
  <text x="520" y="530"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="900"
        font-size="420"
        fill="white"
        text-anchor="middle"
        dominant-baseline="central"
        letter-spacing="-10">F</text>
</svg>
