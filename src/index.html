<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitAll</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0F1117;
      color: #E8ECF1;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Plus Jakarta Sans', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #app {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, #22C55E 0%, #10B981 40%, #06B6D4 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1px;
      box-shadow: 0 0 40px rgba(34, 197, 94, 0.3);
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .tagline {
      color: #6B7280;
      font-size: 14px;
      margin-top: -16px;
    }

    .status {
      color: #9CA3AF;
      font-size: 14px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #1F2937;
      border-top-color: #22C55E;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-panel {
      display: none;
      background: #1A1D27;
      border: 1px solid #2D3348;
      border-radius: 12px;
      padding: 24px;
      max-width: 400px;
    }

    .error-panel h2 {
      color: #EF4444;
      font-size: 16px;
      margin-bottom: 8px;
    }

    .error-panel p {
      color: #9CA3AF;
      font-size: 13px;
      line-height: 1.5;
    }

    .retry-btn {
      margin-top: 16px;
      padding: 8px 20px;
      background: #22C55E;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .retry-btn:hover { background: #16A34A; }

    .version {
      position: fixed;
      bottom: 12px;
      right: 16px;
      color: #2D3348;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="logo">F</div>
    <h1>FitAll</h1>
    <p class="tagline">Your AI Fitness Platform</p>
    <div id="loading">
      <div class="spinner"></div>
      <p class="status" id="status-text">Connecting to fitall.auraalpha.cc...</p>
    </div>
    <div class="error-panel" id="error-panel">
      <h2>Connection Failed</h2>
      <p id="error-text">Unable to reach fitall.auraalpha.cc. Check your internet connection and try again.</p>
      <button class="retry-btn" onclick="connect()">Retry</button>
    </div>
  </div>
  <div class="version" id="version">v1.0.0</div>

  <script>
    const REMOTE_URL = 'https://fitall.auraalpha.cc';
    const HEALTH_URL = REMOTE_URL + '/api/health';

    async function connect() {
      const loading = document.getElementById('loading');
      const errorPanel = document.getElementById('error-panel');
      const statusText = document.getElementById('status-text');

      loading.style.display = 'flex';
      loading.style.flexDirection = 'column';
      loading.style.alignItems = 'center';
      loading.style.gap = '12px';
      errorPanel.style.display = 'none';
      statusText.textContent = 'Connecting to fitall.auraalpha.cc...';

      try {
        const resp = await fetch(HEALTH_URL, { signal: AbortSignal.timeout(8000) });
        if (resp.ok) {
          statusText.textContent = 'Connected. Loading dashboard...';
          // Navigate the entire window to the remote app
          window.location.href = REMOTE_URL;
        } else {
          throw new Error('API returned ' + resp.status);
        }
      } catch (err) {
        loading.style.display = 'none';
        errorPanel.style.display = 'block';
        document.getElementById('error-text').textContent =
          'Unable to reach fitall.auraalpha.cc: ' + err.message + '. Check your internet connection and try again.';
      }
    }

    // Start connecting on load
    connect();
  </script>
</body>
</html>
